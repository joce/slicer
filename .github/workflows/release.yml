name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Publish x64
        run: dotnet publish -c Release -r win-x64 --self-contained -o publish/win-x64

      - name: Publish x86
        run: dotnet publish -c Release -r win-x86 --self-contained -o publish/win-x86

      - name: Publish ARM64
        run: dotnet publish -c Release -r win-arm64 --self-contained -o publish/win-arm64

      - name: Create zip archives
        run: |
          Compress-Archive -Path publish/win-x64/* -DestinationPath slicer-win-x64.zip
          Compress-Archive -Path publish/win-x86/* -DestinationPath slicer-win-x86.zip
          Compress-Archive -Path publish/win-arm64/* -DestinationPath slicer-win-arm64.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            slicer-win-x64.zip
            slicer-win-x86.zip
            slicer-win-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
